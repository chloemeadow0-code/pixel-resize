<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素画缩小工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { font-size: 20px; margin-bottom: 20px; color: #ffb347; }
  .upload-area {
    width: 100%;
    max-width: 400px;
    border: 2px dashed #ffb347;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    margin-bottom: 20px;
    cursor: pointer;
  }
  .upload-area:active { background: rgba(255,179,71,0.1); }
  .controls {
    width: 100%;
    max-width: 400px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .controls.show { display: flex; }
  label { font-size: 14px; color: #ccc; }
  input[type="number"] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #16213e;
    color: #eee;
    font-size: 16px;
  }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #ffb347;
    color: #1a1a2e;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 8px;
  }
  button:active { background: #ffa030; }
  .preview { width: 100%; max-width: 400px; margin-top: 16px; display: none; }
  .preview.show { display: block; }
  .preview img {
    width: 100%;
    image-rendering: pixelated;
    border-radius: 8px;
    border: 1px solid #333;
  }
  .info { font-size: 12px; color: #888; margin-top: 8px; }
  #download { display: none; }
  #download.show { display: block; }
</style>
</head>
<body>

<h1>🎨 像素画缩小工具</h1>

<div class="upload-area" id="uploadArea">
  <p>📁 点击选择图片</p>
  <p class="info">支持 PNG / JPG</p>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
</div>

<div class="controls" id="controls">
  <div class="row">
    <div>
      <label>宽度</label>
      <input type="number" id="width" value="64" min="1">
    </div>
    <div>
      <label>高度</label>
      <input type="number" id="height" value="64" min="1">
    </div>
  </div>
  <label>预设尺寸：</label>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button onclick="setSize(16,16)" style="width:auto;padding:8px 14px;font-size:13px">16</button>
    <button onclick="setSize(32,32)" style="width:auto;padding:8px 14px;font-size:13px">32</button>
    <button onclick="setSize(64,64)" style="width:auto;padding:8px 14px;font-size:13px">64</button>
    <button onclick="setSize(128,128)" style="width:auto;padding:8px 14px;font-size:13px">128</button>
    <button onclick="setSize(256,256)" style="width:auto;padding:8px 14px;font-size:13px">256</button>
  </div>
  <button id="resizeBtn" onclick="doResize()">缩小！</button>
</div>

<div class="preview" id="preview">
  <p style="margin-bottom:8px">✅ 缩小完成！</p>
  <img id="resultImg">
  <p class="info" id="resultInfo"></p>
  <a id="download" href="#" download="resized.png">
    <button style="margin-top:12px">⬇️ 保存图片</button>
  </a>
</div>

<script>
let originalImg = null;

function setSize(w, h) {
  document.getElementById('width').value = w;
  document.getElementById('height').value = h;
}

document.getElementById('uploadArea').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      originalImg = img;
      document.getElementById('width').value = img.width;
      document.getElementById('height').value = img.height;
      document.getElementById('controls').classList.add('show');
      document.querySelector('.upload-area p').textContent = '✅ 已加载: ' + img.width + 'x' + img.height;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function doResize() {
  if (!originalImg) return;
  const w = parseInt(document.getElementById('width').value);
  const h = parseInt(document.getElementById('height').value);
  
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(originalImg, 0, 0, w, h);
  
  const dataUrl = canvas.toDataURL('image/png');
  document.getElementById('resultImg').src = dataUrl;
  document.getElementById('resultInfo').textContent = w + ' x ' + h + ' px';
  document.getElementById('download').href = dataUrl;
  document.getElementById('download').classList.add('show');
  document.getElementById('preview').classList.add('show');
}
</script>

</body>
</html>
